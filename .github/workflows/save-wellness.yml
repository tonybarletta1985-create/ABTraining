name: Save Wellness Data

on:
  repository_dispatch:
    types: [wellness-data]

jobs:
  save-wellness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check sleep quality and save wellness file
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          echo "$PAYLOAD" > /tmp/raw_payload.json
          
          # Check if longest sleep >= 5 hours
          SLEEP_OK=$(echo "$PAYLOAD" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          metrics = data.get('data', {}).get('metrics', [])
          sleep_metric = next((m for m in metrics if m.get('name') == 'sleep_analysis'), None)
          if not sleep_metric:
              print('false')
              sys.exit(0)
          entries = sleep_metric.get('data', [])
          if not entries:
              print('false')
              sys.exit(0)
          longest = max((e.get('totalSleep', 0) for e in entries), default=0)
          print('true' if longest >= 5 else 'false')
          " 2>/dev/null || echo "false")
          
          if [ "$SLEEP_OK" != "true" ]; then
            echo "Sleep data incomplete (< 5 hours) — skipping"
            exit 0
          fi
          
          # Build filename using AEST date
          FILENAME="wellness-$(TZ='Australia/Sydney' date '+%Y-%m-%d').json"
          FILEPATH="data/wellness/$FILENAME"
          
          echo "Writing $FILEPATH"
          echo "$PAYLOAD" > "$FILEPATH"
          
          git config user.name "AB Training Bot"
          git config user.email "actions@github.com"
          git add "$FILEPATH"
          git commit -m "Add $FILENAME" || echo "Nothing to commit"
          git push

      - name: Clean up yesterday's wellness file
        run: |
          YESTERDAY=$(TZ='Australia/Sydney' date -d 'yesterday' '+%Y-%m-%d' 2>/dev/null || TZ='Australia/Sydney' date -v-1d '+%Y-%m-%d')
          OLDFILE="data/wellness/wellness-$YESTERDAY.json"
          
          if [ -f "$OLDFILE" ]; then
            git config user.name "AB Training Bot"
            git config user.email "actions@github.com"
            git rm "$OLDFILE"
            git commit -m "Remove wellness-$YESTERDAY.json after daily update"
            git push
          else
            echo "No yesterday file to clean up"
          fi
